<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server 的四道执行边界</title>
  <desc id="desc">退款请求到达 Server 后，依次经过幂等、对象、状态和金额检查，全部通过才产生业务副作用。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312e81" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#635bff"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="28" fill="url(#background)"/>
  <text x="600" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#17153b">请求到达 Server，不等于应该执行</text>
  <text x="600" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#5d5a78">四道边界全部通过后，才允许产生真实业务副作用</text>

  <g filter="url(#shadow)" font-family="system-ui, sans-serif">
    <rect x="55" y="250" width="170" height="150" rx="22" fill="#ffffff"/>
    <text x="140" y="307" text-anchor="middle" font-size="18" font-weight="700" fill="#25224d">tools/call</text>
    <text x="140" y="343" text-anchor="middle" font-size="17" fill="#686583">退款请求</text>
    <text x="140" y="372" text-anchor="middle" font-size="15" fill="#8b88a4">Host 已放行</text>

    <rect x="275" y="220" width="175" height="210" rx="22" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
    <circle cx="300" cy="258" r="18" fill="#7c3aed"/>
    <text x="300" y="265" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">1</text>
    <text x="370" y="265" text-anchor="middle" font-size="18" font-weight="700" fill="#25224d">幂等边界</text>
    <text x="362" y="315" text-anchor="middle" font-size="16" fill="#686583">同键是否已执行</text>
    <text x="362" y="346" text-anchor="middle" font-size="16" fill="#686583">是否绑定同一订单</text>
    <text x="362" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#7c3aed">拒绝重复副作用</text>

    <rect x="485" y="220" width="175" height="210" rx="22" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="510" cy="258" r="18" fill="#2563eb"/>
    <text x="510" y="265" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">2</text>
    <text x="580" y="265" text-anchor="middle" font-size="18" font-weight="700" fill="#25224d">对象边界</text>
    <text x="572" y="315" text-anchor="middle" font-size="16" fill="#686583">订单是否真实存在</text>
    <text x="572" y="346" text-anchor="middle" font-size="16" fill="#686583">不能只看格式合法</text>
    <text x="572" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">拒绝未知对象</text>

    <rect x="695" y="220" width="175" height="210" rx="22" fill="#ffffff" stroke="#34d399" stroke-width="3"/>
    <circle cx="720" cy="258" r="18" fill="#059669"/>
    <text x="720" y="265" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">3</text>
    <text x="790" y="265" text-anchor="middle" font-size="18" font-weight="700" fill="#25224d">状态边界</text>
    <text x="782" y="315" text-anchor="middle" font-size="16" fill="#686583">当前是否为 paid</text>
    <text x="782" y="346" text-anchor="middle" font-size="16" fill="#686583">是否允许状态迁移</text>
    <text x="782" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">拒绝非法状态</text>

    <rect x="905" y="220" width="175" height="210" rx="22" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="930" cy="258" r="18" fill="#d97706"/>
    <text x="930" y="265" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">4</text>
    <text x="1000" y="265" text-anchor="middle" font-size="18" font-weight="700" fill="#25224d">金额边界</text>
    <text x="992" y="315" text-anchor="middle" font-size="16" fill="#686583">是否超过自动上限</text>
    <text x="992" y="346" text-anchor="middle" font-size="16" fill="#686583">高风险转人工审核</text>
    <text x="992" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#d97706">限制执行路径</text>
  </g>

  <g stroke="#635bff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
    <path d="M231 325H267"/>
    <path d="M456 325H477"/>
    <path d="M666 325H687"/>
    <path d="M876 325H897"/>
    <path d="M1086 325H1135V462H815V488"/>
  </g>

  <rect x="360" y="490" width="505" height="120" rx="24" fill="#17153b" filter="url(#shadow)"/>
  <text x="612" y="538" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">更新订单 + 写入幂等记录</text>
  <text x="612" y="574" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#d8d6f0">最终状态与操作记录证明副作用只发生一次</text>
</svg>
