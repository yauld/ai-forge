<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">MCP transport：stdio 与 Streamable HTTP 对比</title>
  <desc id="desc">同一条 MCP 消息，在 stdio 中通过 Server 子进程的 stdin/stdout 传递，在 Streamable HTTP 中通过 HTTP endpoint 传递。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 24; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .section { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .label { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .text { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .box-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 18; }
      .box-gray { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .code { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .arrow-blue { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #059669; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820"/>

  <text class="title" x="600" y="58" text-anchor="middle">同一条 MCP 消息，两种传输通道</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">Tool / Resource / Prompt 不变，变化的是 Client 和 Server 之间的 transport</text>

  <rect class="panel" x="60" y="130" width="520" height="590"/>
  <rect class="panel" x="620" y="130" width="520" height="590"/>

  <text class="section" x="320" y="178" text-anchor="middle">stdio</text>
  <text class="subtitle" x="320" y="207" text-anchor="middle">Client 启动 Server 子进程</text>

  <rect class="box-blue" x="100" y="255" width="185" height="88"/>
  <text class="label" x="192.5" y="293" text-anchor="middle">Client 进程</text>
  <text class="small" x="192.5" y="321" text-anchor="middle">例如 AI IDE / Host</text>

  <rect class="box-blue" x="355" y="255" width="185" height="88"/>
  <text class="label" x="447.5" y="293" text-anchor="middle">Server 子进程</text>
  <text class="small" x="447.5" y="321" text-anchor="middle">本地 MCP Server</text>

  <path class="arrow-blue" d="M285 278 L355 278"/>
  <text class="code" x="320" y="245" text-anchor="middle">启动子进程</text>

  <path class="arrow-blue" d="M285 390 L355 390"/>
  <text class="code" x="320" y="374" text-anchor="middle">写入 stdin</text>
  <text class="small" x="320" y="416" text-anchor="middle">MCP 请求</text>

  <path class="arrow-blue" d="M355 480 L285 480"/>
  <text class="code" x="320" y="464" text-anchor="middle">读取 stdout</text>
  <text class="small" x="320" y="506" text-anchor="middle">MCP 响应</text>

  <rect class="box-gray" x="115" y="555" width="410" height="108"/>
  <text class="text" x="320" y="588" text-anchor="middle">关键规则</text>
  <text class="small" x="320" y="615" text-anchor="middle">Server 的 stdout</text>
  <text class="small" x="320" y="637" text-anchor="middle">只能写 MCP 消息</text>
  <text class="small" x="320" y="659" text-anchor="middle">普通日志写 stderr</text>

  <text class="section" x="880" y="178" text-anchor="middle">Streamable HTTP</text>
  <text class="subtitle" x="880" y="207" text-anchor="middle">Server 先独立启动，Client 连接 endpoint</text>

  <rect class="box-green" x="665" y="255" width="180" height="88"/>
  <text class="label" x="755" y="293" text-anchor="middle">Client</text>
  <text class="small" x="755" y="321" text-anchor="middle">MCP HTTP Client</text>

  <rect class="box-green" x="925" y="255" width="180" height="88"/>
  <text class="label" x="1015" y="293" text-anchor="middle">HTTP Server</text>
  <text class="small" x="1015" y="321" text-anchor="middle">MCP endpoint</text>

  <rect class="box-gray" x="925" y="380" width="180" height="64"/>
  <text class="code" x="1015" y="418" text-anchor="middle">/mcp</text>

  <path class="arrow-green" d="M845 412 L925 412"/>
  <text class="code" x="885" y="388" text-anchor="middle">HTTP POST</text>
  <text class="small" x="885" y="438" text-anchor="middle">发送 MCP 请求</text>

  <path class="arrow-green" d="M925 505 L845 505"/>
  <text class="code" x="885" y="482" text-anchor="middle">HTTP response</text>
  <text class="small" x="885" y="532" text-anchor="middle">返回 MCP 响应</text>

  <rect class="box-gray" x="680" y="565" width="400" height="92"/>
  <text class="text" x="880" y="596" text-anchor="middle">关键变化</text>
  <text class="small" x="880" y="624" text-anchor="middle">Server 从本地子进程</text>
  <text class="small" x="880" y="646" text-anchor="middle">变成可连接的 HTTP 服务</text>

  <rect class="box-gray" x="210" y="750" width="780" height="46"/>
  <text class="text" x="600" y="779" text-anchor="middle">不变的是 MCP 语义：initialize → tools/list → tools/call → Tool Result</text>
</svg>
