<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">MCP 调用失败分层排查流程</title>
  <desc id="desc">从 Server 进程、Transport、Lifecycle、Discovery、输入校验到 Tool 执行和业务结果的排查流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .node-title { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .node-text { font: 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .edge-text { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .decision { fill: #eef2ff; stroke: #6366f1; stroke-width: 3; }
      .start { fill: #4f46e5; stroke: #4338ca; stroke-width: 3; }
      .problem { fill: #fff7ed; stroke: #f97316; stroke-width: 3; }
      .success { fill: #ecfdf5; stroke: #10b981; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1400" height="1120" fill="#ffffff"/>
  <text x="700" y="54" text-anchor="middle" class="title">MCP 调用失败：从哪一层开始排查？</text>

  <rect x="510" y="82" width="380" height="66" rx="18" class="start"/>
  <text x="700" y="124" text-anchor="middle" style="font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#fff">MCP 调用失败</text>

  <path d="M700 148 V180" class="line"/>
  <polygon points="700,174 880,229 700,284 520,229" class="decision"/>
  <text x="700" y="237" text-anchor="middle" class="node-title">Server 进程启动了吗？</text>

  <path d="M520 229 H405" class="line"/>
  <text x="463" y="214" text-anchor="middle" class="edge-text">没有</text>
  <rect x="35" y="180" width="370" height="98" rx="16" class="problem"/>
  <text x="220" y="218" text-anchor="middle" class="node-title">进程层</text>
  <text x="220" y="251" text-anchor="middle" class="node-text">检查命令、路径、环境变量</text>

  <path d="M700 284 V326" class="line"/>
  <text x="732" y="310" class="edge-text">已启动</text>
  <polygon points="700,320 880,375 700,430 520,375" class="decision"/>
  <text x="700" y="383" text-anchor="middle" class="node-title">消息能正常传输吗？</text>

  <path d="M880 375 H995" class="line"/>
  <text x="938" y="360" text-anchor="middle" class="edge-text">不能</text>
  <rect x="995" y="326" width="370" height="98" rx="16" class="problem"/>
  <text x="1180" y="364" text-anchor="middle" class="node-title">Transport 层</text>
  <text x="1180" y="397" text-anchor="middle" class="node-text">检查 stdout、HTTP 状态和连接</text>

  <path d="M700 430 V472" class="line"/>
  <text x="732" y="456" class="edge-text">可以</text>
  <polygon points="700,466 880,521 700,576 520,521" class="decision"/>
  <text x="700" y="529" text-anchor="middle" class="node-title">initialize 完成了吗？</text>

  <path d="M520 521 H405" class="line"/>
  <text x="463" y="506" text-anchor="middle" class="edge-text">没有</text>
  <rect x="35" y="472" width="370" height="98" rx="16" class="problem"/>
  <text x="220" y="510" text-anchor="middle" class="node-title">Lifecycle 层</text>
  <text x="220" y="543" text-anchor="middle" class="node-text">检查协议版本与能力协商</text>

  <path d="M700 576 V618" class="line"/>
  <text x="732" y="602" class="edge-text">已完成</text>
  <polygon points="700,612 880,667 700,722 520,667" class="decision"/>
  <text x="700" y="675" text-anchor="middle" class="node-title">Tool 和 schema 正确吗？</text>

  <path d="M880 667 H995" class="line"/>
  <text x="938" y="652" text-anchor="middle" class="edge-text">不正确</text>
  <rect x="995" y="618" width="370" height="98" rx="16" class="problem"/>
  <text x="1180" y="656" text-anchor="middle" class="node-title">Discovery 层</text>
  <text x="1180" y="689" text-anchor="middle" class="node-text">对照 tools/list 与调用参数</text>

  <path d="M700 722 V764" class="line"/>
  <text x="732" y="748" class="edge-text">正确</text>
  <polygon points="700,758 880,813 700,868 520,813" class="decision"/>
  <text x="700" y="821" text-anchor="middle" class="node-title">输入通过校验了吗？</text>

  <path d="M520 813 H405" class="line"/>
  <text x="463" y="798" text-anchor="middle" class="edge-text">没有</text>
  <rect x="35" y="764" width="370" height="98" rx="16" class="problem"/>
  <text x="220" y="802" text-anchor="middle" class="node-title">输入边界</text>
  <text x="220" y="835" text-anchor="middle" class="node-text">修正参数类型、格式和值域</text>

  <path d="M700 868 V910" class="line"/>
  <text x="732" y="894" class="edge-text">已通过</text>
  <polygon points="700,904 880,959 700,1014 520,959" class="decision"/>
  <text x="700" y="967" text-anchor="middle" class="node-title">Tool 返回了什么？</text>

  <path d="M520 959 H405" class="line"/>
  <text x="463" y="944" text-anchor="middle" class="edge-text">isError: true</text>
  <rect x="35" y="910" width="370" height="98" rx="16" class="problem"/>
  <text x="220" y="948" text-anchor="middle" class="node-title">Execution 层</text>
  <text x="220" y="981" text-anchor="middle" class="node-text">检查 Tool 实现和外部依赖</text>

  <path d="M880 959 H995" class="line"/>
  <text x="938" y="944" text-anchor="middle" class="edge-text">isError: false</text>
  <rect x="995" y="910" width="370" height="98" rx="16" class="success"/>
  <text x="1180" y="948" text-anchor="middle" class="node-title">业务结果</text>
  <text x="1180" y="981" text-anchor="middle" class="node-text">按 found、not_found 等状态处理</text>

  <text x="700" y="1080" text-anchor="middle" class="node-text">先确认请求走到了哪一层，再决定该查什么</text>
</svg>
