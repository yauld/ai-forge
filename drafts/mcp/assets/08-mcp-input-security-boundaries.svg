<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">MCP Tool 输入安全的三道边界</title>
  <desc id="desc">模型或应用提出 Tool 调用参数后，依次经过 Schema 与运行时校验、固定 SQL 与参数绑定、返回数量与字段限制。非法参数在第一道边界被拒绝，合法调用最终只返回最小必要结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 38px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .node-title { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .node-text { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .edge-text { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .number { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .start { fill: #4f46e5; stroke: #4338ca; stroke-width: 3; }
      .gate-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 3; }
      .gate-green { fill: #ecfdf5; stroke: #10b981; stroke-width: 3; }
      .gate-cyan { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; }
      .blocked { fill: #fff7ed; stroke: #f97316; stroke-width: 3; }
      .database { fill: #ffffff; stroke: #94a3b8; stroke-width: 3; }
      .success { fill: #0f766e; stroke: #115e59; stroke-width: 3; }
      .line { fill: none; stroke: #64748b; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1120"/>

  <text class="title" x="700" y="58" text-anchor="middle">MCP Tool 输入安全的三道边界</text>
  <text class="subtitle" x="700" y="94" text-anchor="middle">入口限制参数，执行时固定 SQL，出口只返回最小必要数据</text>

  <rect class="start" x="450" y="126" width="500" height="82" rx="20"/>
  <text x="700" y="177" text-anchor="middle" style="font:700 25px -apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;fill:#ffffff">模型或应用提出 Tool 调用参数</text>

  <path class="line" d="M700 208 V254"/>

  <rect class="gate-blue" x="80" y="260" width="1240" height="132" rx="24"/>
  <circle cx="140" cy="326" r="29" fill="#2563eb"/>
  <text class="number" x="140" y="335" text-anchor="middle">1</text>
  <text class="node-title" x="195" y="314">Schema + 运行时校验</text>
  <text class="node-text" x="195" y="352">限制参数类型、枚举和值域</text>

  <path class="line" d="M900 326 H1004"/>
  <text class="edge-text" x="952" y="306" text-anchor="middle">非法</text>
  <rect class="blocked" x="1010" y="276" width="280" height="100" rx="18"/>
  <text class="node-title" x="1150" y="316" text-anchor="middle">拒绝调用</text>
  <text class="node-text" x="1150" y="350" text-anchor="middle">业务查询函数不执行</text>

  <path class="line" d="M700 392 V454"/>
  <text class="edge-text" x="730" y="429">合法</text>

  <rect class="gate-green" x="80" y="460" width="1240" height="132" rx="24"/>
  <circle cx="140" cy="526" r="29" fill="#059669"/>
  <text class="number" x="140" y="535" text-anchor="middle">2</text>
  <text class="node-title" x="195" y="514">固定 SQL + 参数绑定</text>
  <text class="node-text" x="195" y="552">输入只能作为参数值，不能改变 SQL 结构</text>

  <path class="line" d="M700 592 V652"/>

  <rect class="database" x="415" y="658" width="570" height="94" rx="20"/>
  <text class="node-title" x="700" y="699" text-anchor="middle">执行订单查询</text>
  <text class="node-text" x="700" y="730" text-anchor="middle">数据库只解释 Server 固定的查询结构</text>

  <path class="line" d="M700 752 V812"/>

  <rect class="gate-cyan" x="80" y="818" width="1240" height="132" rx="24"/>
  <circle cx="140" cy="884" r="29" fill="#0891b2"/>
  <text class="number" x="140" y="893" text-anchor="middle">3</text>
  <text class="node-title" x="195" y="872">限制返回数量和字段</text>
  <text class="node-text" x="195" y="910">减少单次查询范围与不必要的数据暴露</text>

  <path class="line" d="M700 950 V1002"/>

  <rect class="success" x="450" y="1008" width="500" height="78" rx="20"/>
  <text x="700" y="1057" text-anchor="middle" style="font:700 25px -apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;fill:#ffffff">MCP Client 获得最小必要结果</text>
</svg>
